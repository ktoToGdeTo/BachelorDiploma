<h2 class="page-title">
  Доступные задачи
</h2>

<div class="tasks-wrapper">
  <div class="tasks-list-container">
    @for (task of tasks; track task.id) {
      <app-task-card-component 
        [task]="task" 
        (deleteTask)="deleteTask($event)" 
        (changeTask)="updateTask($event)">
      </app-task-card-component>
    } @empty {
      <div class="empty-state">
        <p class="empty-text">Задач пока нет</p>
        <p class="empty-hint">Создайте первую задачу, чтобы начать работу!</p>
        <a href="/tasks/new" class="btn-create-first">
          Создать задачу
        </a>
      </div>
    }
  </div>
</div>
