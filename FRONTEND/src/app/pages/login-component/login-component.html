<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2 class="auth-title">Вход в систему</h2>
      <p class="auth-subtitle">Введите данные для доступа к задачам</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form" novalidate>
      <div class="form-group">
        <label for="username" class="form-label">Логин</label>
        <input
          id="username"
          formControlName="username"
          type="text"
          placeholder="Введите логин"
          autocomplete="username"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Пароль</label>
        <input
          id="password"
          formControlName="password"
          type="password"
          placeholder="Введите пароль"
          autocomplete="current-password"
          class="form-input"
        />
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn btn-primary btn-full">
        Войти
      </button>
    </form>

    <div class="auth-footer">
      <p>Нет аккаунта? <a href="/register" class="link-primary">Зарегистрироваться</a></p>
    </div>
  </div>
</div>
