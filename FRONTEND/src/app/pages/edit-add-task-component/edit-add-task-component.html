<div class="task-form-container">
  <div class="form-card">
    <div class="form-header">
      <h2 class="form-title">{{ isCreateMode ? 'Создание задачи' : 'Редактирование задачи' }}</h2>
    </div>

    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="task-form">
      
      <!-- Название -->
      <div class="form-group">
        <label for="title" class="form-label">Название задачи</label>
        <input 
          id="title" 
          formControlName="title" 
          type="text" 
          placeholder="Например: Исправить баг в авторизации" 
          class="form-input"
        />
        <span class="form-hint">Обязательное поле, минимум 3 символа</span>
      </div>

      <!-- Описание -->
      <div class="form-group">
        <label for="description" class="form-label">Описание</label>
        <textarea 
          id="description" 
          formControlName="description" 
          placeholder="Подробно опишите суть задачи, шаги воспроизведения или ожидаемый результат..." 
          rows="5" 
          class="form-textarea"
        ></textarea>
      </div>

      <!-- Статус -->
      <div class="form-group">
        <label for="status" class="form-label">Статус</label>
        <div class="select-wrapper">
          <select id="status" formControlName="status" class="form-select">
            <option value="" disabled>Выберите статус</option>
            @for (s of statusOptions; track s.value) {
              <option [value]="s.value">{{ s.label }}</option>
            }
          </select>
          <span class="select-arrow">▼</span>
        </div>
      </div>

      <!-- Кнопки -->
      <div class="form-actions">
        <button 
          type="submit" 
          [disabled]="taskForm.invalid || taskForm.pristine" 
          class="btn btn-primary"
        >
          {{ isCreateMode ? 'Создать задачу' : 'Сохранить изменения' }}
        </button>
        <button type="button" (click)="onCancel()" class="btn btn-secondary">
          Отмена
        </button>
      </div>

    </form>
  </div>
</div>
